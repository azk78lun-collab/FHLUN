name: Build multi-user sing-box

on:
  workflow_dispatch:
    inputs:
      sing_box_version:
        description: sing-box version without leading v
        required: true
        default: 1.13.14

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.7
          cache: false
      - name: Fetch sing-box source
        run: git clone --depth 1 --branch "v${{ inputs.sing_box_version }}" https://github.com/SagerNet/sing-box.git "$RUNNER_TEMP/sing-box"
      - name: Build enhanced core
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          SING_BOX_VERSION: ${{ inputs.sing_box_version }}
          SING_BOX_SOURCE_DIR: ${{ runner.temp }}/sing-box
        run: modules/multiuser/build-singbox-enhanced.sh "$GITHUB_WORKSPACE/sing-box-multiuser-${{ matrix.arch }}" "$GITHUB_WORKSPACE/lun-sb-stats-${{ matrix.arch }}"
      - name: Verify build tags
        if: matrix.arch == 'amd64'
        run: ./sing-box-multiuser-amd64 version | grep with_v2ray_api
      - uses: actions/upload-artifact@v4
        with:
          name: sing-box-multiuser-${{ matrix.arch }}
          path: |
            sing-box-multiuser-${{ matrix.arch }}
            lun-sb-stats-${{ matrix.arch }}
          if-no-files-found: error
